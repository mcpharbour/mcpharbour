name: Test Matrix

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # L0 — static lint of the workflow definitions themselves.
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  # L1 + L2 — unit and integration suite on every OS (emits Allure results).
  pytest:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      PYTHON_KEYRING_BACKEND: keyrings.alt.file.PlaintextKeyring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]" keyrings.alt
      - name: Run unit + integration tests
        run: python -m pytest tests/unit tests/integration --alluredir=allure-results -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-pytest-${{ matrix.os }}
          path: allure-results
          if-no-files-found: ignore

  # L3 — npx-backed end-to-end protocol test (ubuntu has Node/npx).
  e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      PYTHON_KEYRING_BACKEND: keyrings.alt.file.PlaintextKeyring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: pip install -e ".[dev]" keyrings.alt
      - name: Run e2e tests
        run: python -m pytest tests/e2e --alluredir=allure-results -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-e2e
          path: allure-results
          if-no-files-found: ignore

  # L4 — reusable binary build.
  build:
    uses: ./.github/workflows/build.yml

  # L5 — usability scenario against the frozen binary (also emits Allure).
  binary-smoke:
    needs: build
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: windows-x64
    runs-on: ${{ matrix.os }}
    env:
      PYTHON_KEYRING_BACKEND: keyrings.alt.file.PlaintextKeyring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install scenario deps
        run: pip install -e ".[dev]"
      - uses: actions/download-artifact@v4
        with:
          name: mcp-harbour-${{ matrix.platform }}
      - name: Extract binary (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -xzf mcp-harbour-${{ matrix.platform }}.tar.gz
          chmod +x harbour
      - name: Extract binary (Windows)
        if: runner.os == 'Windows'
        run: Expand-Archive -Path mcp-harbour-${{ matrix.platform }}.zip -DestinationPath .
      - name: Run scenario (Unix)
        if: runner.os != 'Windows'
        run: python tests/smoke/scenario.py serve-check --harbour ./harbour --alluredir allure-results --allure-name "binary-smoke (${{ matrix.platform }})"
      - name: Run scenario (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python tests/smoke/scenario.py serve-check --harbour .\harbour.exe --alluredir allure-results --allure-name "binary-smoke (${{ matrix.platform }})"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-binary-${{ matrix.platform }}
          path: allure-results
          if-no-files-found: ignore

  # Generate this run's Allure 3 report, publish it under runs/<run-number>/
  # on the gh-pages branch (keeping prior runs), and regenerate the landing
  # page that lists every run. Pages must serve the gh-pages branch
  # (Settings → Pages → Source: Deploy from a branch → gh-pages / root).
  report:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [pytest, e2e, binary-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    concurrency:
      group: allure-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: allure-results-*
          merge-multiple: true
      - name: Restore Allure history
        uses: actions/cache@v4
        with:
          path: history.jsonl
          key: allure-history-${{ github.run_id }}
          restore-keys: |
            allure-history-
      - name: Generate Allure 3 report
        run: npx --yes allure@latest generate all-results -c allurerc.mjs --output run-report
      - name: Assemble site (this run's report + landing index)
        run: |
          mkdir -p "publish/runs/${{ github.run_number }}"
          cp -r run-report/. "publish/runs/${{ github.run_number }}/"
          # Seed runs.json from the existing gh-pages branch (source of truth,
          # not the CDN); empty list on the first run.
          if git fetch origin gh-pages --depth=1 2>/dev/null; then
            git show origin/gh-pages:runs.json > publish/runs.json 2>/dev/null || echo "[]" > publish/runs.json
          else
            echo "[]" > publish/runs.json
          fi
          python tests/ci/build_report_index.py \
            --site publish \
            --results all-results \
            --repo "${{ github.repository }}" \
            --run-number "${{ github.run_number }}" \
            --run-id "${{ github.run_id }}" \
            --date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --ref "${{ github.ref_name }}" \
            --commit "${{ github.sha }}" \
            --trigger "${{ github.event_name }}"
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish
          publish_branch: gh-pages
          keep_files: true
