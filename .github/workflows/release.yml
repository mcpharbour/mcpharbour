name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # manual trigger for testing builds

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build harbour
        run: pyinstaller --onefile --name harbour entry_harbour.py

      - name: Build harbour-bridge
        run: pyinstaller --onefile --name harbour-bridge mcp_harbour/bridge.py

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp dist/harbour release/
          cp dist/harbour-bridge release/
          cp scripts/install.sh release/
          cp scripts/uninstall.sh release/
          tar -czf mcp-harbour-${{ matrix.platform }}.tar.gz -C release .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir release
          copy dist\harbour.exe release\
          copy dist\harbour-bridge.exe release\
          copy scripts\install.ps1 release\
          copy scripts\uninstall.ps1 release\
          Compress-Archive -Path release\* -DestinationPath mcp-harbour-${{ matrix.platform }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: mcp-harbour-${{ matrix.platform }}
          path: mcp-harbour-${{ matrix.platform }}.*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            mcp-harbour-linux-x64.tar.gz
            mcp-harbour-darwin-arm64.tar.gz
            mcp-harbour-windows-x64.zip
            scripts/install.sh
            scripts/install.ps1
            scripts/uninstall.sh
            scripts/uninstall.ps1
