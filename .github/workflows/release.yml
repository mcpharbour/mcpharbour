name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # manual trigger for testing builds

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: |
          cp scripts/install.sh .
          cp scripts/install.ps1 .
          cp scripts/uninstall.sh .
          cp scripts/uninstall.ps1 .
          sha256sum \
            mcp-harbour-linux-x64.tar.gz \
            mcp-harbour-darwin-arm64.tar.gz \
            mcp-harbour-windows-x64.zip \
            install.sh \
            install.ps1 \
            uninstall.sh \
            uninstall.ps1 > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            mcp-harbour-linux-x64.tar.gz
            mcp-harbour-darwin-arm64.tar.gz
            mcp-harbour-windows-x64.zip
            install.sh
            install.ps1
            uninstall.sh
            uninstall.ps1
            checksums.txt
